<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Interview Preparation - MNC Prep</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <!-- Sidebar navigation placeholder (Injected by JS api.js) -->
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
      
      <!-- Top header -->
      <div class="dashboard-header">
        <div>
          <h1 style="font-size: 2.2rem; font-weight: 800;">HR Interview Preparation</h1>
          <p style="color: var(--text-secondary); margin-top: 5px;">Formulate behavioral answers using the STAR method.</p>
        </div>
      </div>

      <!-- Main workspace -->
      <div class="quiz-container">
        <div id="hr-area">
          <div style="text-align: center; padding: 40px; color: var(--text-secondary);">Loading questions...</div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/prep.js"></script>
</body>
</html>
